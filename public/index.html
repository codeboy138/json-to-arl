<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON → ARL Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #eef0f2;
    --surface: #f5f6f7;
    --surface2: #e8eaec;
    --border: #d0d4d8;
    --border2: #b8bdc3;
    --accent: #0077cc;
    --accent2: #2e8b3a;
    --accent3: #cc5500;
    --text: #1a2028;
    --text2: #4a5560;
    --text3: #8a9aa8;
    --folder: #a06000;
    --file: #0055aa;
    --done: #1a7a2a;
    --error: #cc2222;
    --processing: #7744bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 16px;
  }

  .header-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text2); }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 5px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-upload-files { background: var(--border2); color: var(--text); }
  .btn-upload-folder { background: var(--border2); color: var(--folder); }
  .btn-upload-files:hover { background: var(--border); }
  .btn-upload-folder:hover { background: var(--border); }

  .btn-convert {
    background: var(--accent);
    color: #f5f6f7;
    font-weight: 600;
    display: none;
  }
  .btn-convert:hover { background: #0066bb; }
  .btn-convert:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .btn-dl-zip { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); display: none; }
  .btn-dl-zip:hover { background: var(--accent2); color: #f5f6f7; }

  .btn-dl-folder { background: transparent; color: var(--accent3); border: 1px solid var(--accent3); display: none; }
  .btn-dl-folder:hover { background: var(--accent3); color: #fff; }

  .file-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text3);
    white-space: nowrap;
  }

  /* ── MAIN LAYOUT ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── PANELS ── */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .panel + .panel { border-left: 1px solid var(--border); }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .panel-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  .badge-before { background: #ddeeff; color: var(--accent); }
  .badge-after  { background: #ddf5e0; color: var(--accent2); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 0;
    position: relative;
    min-height: 0;
  }

  /* ── DROPZONE overlay ── */
  .dropzone-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.2s;
    z-index: 2;
  }

  .dropzone-overlay.hidden { opacity: 0; }

  .drop-icon-big { font-size: 2.8rem; }
  .drop-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text3);
    text-align: center;
    line-height: 1.8;
  }
  .drop-label strong { color: var(--text2); }

  .workspace.drag-over .panel-left { border: 2px dashed var(--accent); }
  .workspace.drag-over .dropzone-overlay { opacity: 1; }

  /* ── TREE ── */
  .tree-root { padding: 0 8px; }

  .tree-node { user-select: none; }

  .tree-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    padding: 2px 0;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .tree-row:hover { background: var(--surface2); }

  .tree-indent { flex-shrink: 0; }

  .tree-toggle {
    width: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 0.875rem;
    padding-top: 3px;
    transition: transform 0.15s;
  }

  .tree-icon {
    width: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.875rem;
    padding-top: 1px;
  }

  .tree-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    padding: 2px 4px;
    color: var(--text);
    line-height: 1.4;
    word-break: break-all;
  }

  .tree-name.folder-name { color: var(--folder); }
  .tree-name.file-name   { color: var(--file); }

  .tree-status {
    margin-left: auto;
    padding: 0 8px 0 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    white-space: nowrap;
    padding-top: 3px;
    flex-shrink: 0;
  }
  .status-waiting   { color: var(--text3); }
  .status-processing{ color: var(--processing); }
  .status-done      { color: var(--done); }
  .status-error     { color: var(--error); }

  .tree-children { display: none; }
  .tree-children.open { display: block; }

  .url-list {
    display: none;
    padding: 6px 0 6px 20px;
    flex-direction: column;
    gap: 8px;
  }
  .url-list.open { display: flex; }

  .url-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: default;
    transition: border-color 0.15s;
    flex-direction: column;
  }
  .url-item:hover { border-color: var(--border2); }
  .url-item.expanded { border-color: var(--accent); }

  .url-thumb {
    width: 96px;
    height: 96px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--border);
    flex-shrink: 0;
    border: 1px solid var(--border2);
  }
  .url-thumb.error-thumb {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.875rem;
    color: var(--error);
    background: #fce8e8;
  }

  .url-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .url-preview-img {
    display: block;
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .url-expand-wrap { padding: 0 0 4px 0; display: block; }

  /* ── RIGHT PANEL - converted tree ── */
  .converted-file-name { color: var(--accent2) !important; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4858; }

  /* ── DRAG HIGHLIGHT ── */
  .drag-over-active {
    outline: 2px dashed var(--accent) !important;
    outline-offset: -4px;
    background: #ddeeff !important;
  }

  /* ── RESIZER ── */
  .resizer {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
    z-index: 10;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent); }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  /* ── CONTEXT TAG ── */
  .url-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text3);
    background: var(--surface2);
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  .clear-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .clear-btn:hover { color: var(--error); border-color: var(--error); }

  input[type=file] { display: none; }

  /* ── PASTE PANEL ── */
  .paste-panel {
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .paste-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }

  .paste-header:hover { background: var(--surface2); }

  .paste-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .paste-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .paste-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text3);
  }

  .paste-chevron {
    font-size: 0.875rem;
    color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .paste-chevron.open { transform: rotate(180deg); }

  .paste-body {
    display: none;
    padding: 0 10px 10px 10px;
    gap: 6px;
    flex-direction: column;
  }
  .paste-body.open { display: flex; }

  .paste-textarea {
    width: 100%;
    height: 120px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    padding: 8px 10px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .paste-textarea:focus { border-color: var(--accent); }
  .paste-textarea.valid { border-color: var(--done); }
  .paste-textarea.invalid { border-color: var(--error); }
  .paste-textarea::placeholder { color: var(--text3); }

  .paste-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn-paste-add {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #f5f6f7;
    transition: background 0.15s;
  }
  .btn-paste-add:hover { background: #0066bb; }
  .btn-paste-add:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .btn-paste-clear {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
  }
  .btn-paste-clear:hover { color: var(--error); border-color: var(--error); }

  .paste-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    margin-left: auto;
  }
  /* ── RIGHT PANEL SELECTION ── */
  .right-action-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .right-action-bar.visible { display: flex; }

  .sel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    color: var(--text2);
    margin-right: 4px;
    white-space: nowrap;
  }

  .btn-sel-zip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--accent2);
    background: transparent;
    color: var(--accent2);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-sel-zip:hover { background: var(--accent2); color: #f5f6f7; }

  .btn-sel-folder {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--accent3);
    background: transparent;
    color: var(--accent3);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-sel-folder:hover { background: var(--accent3); color: #fff; }

  .btn-sel-clear {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
    margin-left: auto;
  }
  .btn-sel-clear:hover { color: var(--error); border-color: var(--error); }

  /* ── AUTO-EXPAND TOGGLE ── */
  .toggle-switch {
    width: 34px;
    height: 18px;
    background: var(--border2);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text2);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch.on .toggle-thumb {
    transform: translateX(16px);
    background: #ffffff;
  }

  /* Checkboxes in right tree */
  .tree-check {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
    margin-right: 2px;
    margin-top: 2px;
  }

  .tree-row.selected { background: #ddeeff; }
</style>
</head>
<body>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="inputFiles" accept=".json" multiple>
<input type="file" id="inputFolder" accept=".json" webkitdirectory multiple>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">JSON<span> → </span>ARL</div>
    <div class="file-count" id="fileCount">No files</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-upload-files" onclick="document.getElementById('inputFiles').click()">📄 Select Files</button>
    <button class="btn btn-upload-folder" onclick="document.getElementById('inputFolder').click()">📁 Select Folder</button>
    <button class="btn btn-convert" id="convertBtn">⚡ Convert</button>
    <button class="btn btn-dl-zip" id="dlZipBtn">📦 Download ZIP</button>
    <button class="btn btn-dl-folder" id="dlFolderBtn">🗂 Download as Folder</button>
    <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearAll()">✕ Clear</button>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- WORKSPACE -->
<div class="workspace" id="workspace">

  <!-- LEFT PANEL -->
  <div class="panel panel-left" id="panelLeft">
    <div class="panel-header">
      <div class="panel-title">Before</div>
      <div class="panel-badge badge-before">JSON</div>
      <label id="autoExpandLabel" style="display:none;align-items:center;gap:6px;margin-left:auto;cursor:pointer;user-select:none;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--text3)">
        <span>Auto-expand</span>
        <div class="toggle-switch" id="autoExpandToggle" onclick="toggleAutoExpand()">
          <div class="toggle-thumb"></div>
        </div>
      </label>
      <button id="expandAllBtn" class="clear-btn" style="display:none;color:var(--accent);border-color:var(--accent)" onclick="expandAll()">⊟ Collapse All</button>
    </div>
    <div class="panel-body" id="leftBody">
      <div class="dropzone-overlay" id="dropOverlay">
        <div class="drop-icon-big">📂</div>
        <div class="drop-label">
          <strong>Drag files here</strong> or<br>use the buttons above<br><span style="color:var(--text3);font-size: 0.875rem">.json files &amp; folders · Paste JSON in the panel below</span>
        </div>
      </div>
      <div class="tree-root" id="leftTree"></div>
    </div>

    <!-- PASTE PANEL -->
    <div class="paste-panel" id="pastePanel">
      <div class="paste-header" id="pasteToggle">
        <div class="paste-header-left">
          <span style="font-size: 0.875rem">📋</span>
          <span class="paste-title">Paste JSON</span>
          <span class="paste-hint">Paste JSON code to add as a file</span>
        </div>
        <span class="paste-chevron" id="pasteChevron">▼</span>
      </div>
      <div class="paste-body" id="pasteBody">
        <textarea
          class="paste-textarea"
          id="pasteTextarea"
          placeholder='{ "key": "value", ... }  ← Paste JSON code here (Ctrl+V)'
          spellcheck="false"
        ></textarea>
        <div class="paste-actions">
          <button class="btn-paste-add" id="btnPasteAdd" disabled>＋ Add as File</button>
          <button class="btn-paste-clear" id="btnPasteClear">Clear</button>
          <span class="paste-status" id="pasteStatus"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- RESIZER -->
  <div class="resizer" id="resizer"></div>

  <!-- RIGHT PANEL -->
  <div class="panel panel-right" id="panelRight">
    <div class="panel-header">
      <div class="panel-title">After</div>
      <div class="panel-badge badge-after">ARL</div>
      <label style="display:flex;align-items:center;gap:6px;margin-left:auto;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:0.875rem;color:var(--text3);user-select:none">
        <input type="checkbox" id="checkAll" style="accent-color:var(--accent);width:14px;height:14px"> Select All
      </label>
    </div>
    <div class="panel-body" id="rightBody">
      <div class="dropzone-overlay hidden" id="rightOverlay">
        <div class="drop-icon-big" style="opacity:0.3">🗂</div>
        <div class="drop-label" style="color:var(--text3)">Converted results will appear here</div>
      </div>
      <div class="tree-root" id="rightTree"></div>
    </div>
    <div class="right-action-bar" id="rightActionBar">
      <span class="sel-count" id="selCount">0 selected</span>
      <button class="btn-sel-zip" id="btnSelZip">📦 ZIP Selected</button>
      <button class="btn-sel-folder" id="btnSelFolder">🗂 Save Selected to Folder</button>
      <button class="btn-sel-clear" id="btnSelClear">✕ Deselect All</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const WORKER_URL = 'https://json-to-arl.cwicwi2016.workers.dev/convert';

// fileMap: Map<id, { file, path (array), relativePath (string) }>
let fileMap = new Map();
let idCounter = 0;
// results: Map<id, { data } | { error }>
let results = new Map();
// selectedIds: Set of file ids selected in right panel
let selectedIds = new Set();

// ─────────────────────────────────────────
// ELEMENTS
// ─────────────────────────────────────────
const convertBtn   = document.getElementById('convertBtn');
const dlZipBtn     = document.getElementById('dlZipBtn');
const dlFolderBtn  = document.getElementById('dlFolderBtn');
const clearBtnEl   = document.getElementById('clearBtn');
const leftTree     = document.getElementById('leftTree');
const rightTree    = document.getElementById('rightTree');
const fileCountEl  = document.getElementById('fileCount');
const dropOverlay  = document.getElementById('dropOverlay');
const rightOverlay = document.getElementById('rightOverlay');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const checkAllEl   = document.getElementById('checkAll');
const rightActionBar = document.getElementById('rightActionBar');
const selCountEl   = document.getElementById('selCount');
const btnSelZip    = document.getElementById('btnSelZip');
const btnSelFolder = document.getElementById('btnSelFolder');
const btnSelClear  = document.getElementById('btnSelClear');

// ── Selection helpers ──
function updateSelectionUI() {
  const count = selectedIds.size;
  rightActionBar.classList.toggle('visible', count > 0);
  selCountEl.textContent = `${count} selected`;
  // Sync checkAll state
  const allSuccessIds = [...results.entries()].filter(([,r]) => !r.error).map(([id]) => id);
  checkAllEl.indeterminate = count > 0 && count < allSuccessIds.length;
  checkAllEl.checked = allSuccessIds.length > 0 && count === allSuccessIds.length;
}

function collectIdsFromNode(node) {
  // Recursively collect all successful file ids under a node
  const ids = [];
  function walk(n) {
    if (n.type === 'file') {
      const r = results.get(n.id);
      if (r && !r.error) ids.push(n.id);
    } else if (n.children) {
      n.children.forEach(walk);
    }
  }
  walk(node);
  return ids;
}

// ─────────────────────────────────────────
// DRAG & DROP on workspace
// ─────────────────────────────────────────
const workspace = document.getElementById('workspace');
workspace.addEventListener('dragover', e => {
  e.preventDefault();
  workspace.classList.add('drag-over');
  document.getElementById('panelLeft').classList.add('drag-over-active');
});
workspace.addEventListener('dragleave', e => {
  if (!workspace.contains(e.relatedTarget)) {
    workspace.classList.remove('drag-over');
    document.getElementById('panelLeft').classList.remove('drag-over-active');
  }
});
workspace.addEventListener('drop', async e => {
  e.preventDefault();
  workspace.classList.remove('drag-over');
  document.getElementById('panelLeft').classList.remove('drag-over-active');

  const items = [...e.dataTransfer.items];
  const collected = [];

  async function traverseEntry(entry, pathArr) {
    if (entry.isFile) {
      return new Promise(res => {
        entry.file(f => {
          if (f.name.endsWith('.json')) {
            collected.push({ file: f, path: pathArr });
          }
          res();
        });
      });
    } else if (entry.isDirectory) {
      return new Promise(res => {
        const reader = entry.createReader();
        function readAll() {
          reader.readEntries(async entries => {
            if (!entries.length) return res();
            await Promise.all(entries.map(ent => traverseEntry(ent, [...pathArr, entry.name])));
            readAll();
          });
        }
        readAll();
      });
    }
  }

  const promises = items
    .filter(it => it.kind === 'file')
    .map(it => it.webkitGetAsEntry())
    .filter(Boolean)
    .map(entry => traverseEntry(entry, []));

  await Promise.all(promises);
  addFilesRaw(collected);
});

// ─────────────────────────────────────────
// ADD FILES
// ─────────────────────────────────────────
function addFiles(fileArr, useRelativePath) {
  const raw = fileArr
    .filter(f => f.name.endsWith('.json'))
    .map(f => {
      const rp = f.webkitRelativePath || f.name;
      const parts = rp.split('/');
      const pathArr = parts.slice(0, -1); // directory parts
      return { file: f, path: pathArr };
    });
  addFilesRaw(raw);
}

function addFilesRaw(rawArr) {
  if (!rawArr.length) return;
  rawArr.forEach(({ file, path }) => {
    const id = ++idCounter;
    fileMap.set(id, { file, path });
  });
  updateUI();
}

// ─────────────────────────────────────────
// BUILD TREE DATA
// ─────────────────────────────────────────
function buildTreeData(map) {
  // Returns nested structure: { type:'folder'|'file', name, children?, id? }
  const root = { type: 'folder', name: '__root__', children: [] };

  map.forEach((entry, id) => {
    const { file, path } = entry;
    let cur = root;
    path.forEach(seg => {
      let child = cur.children.find(c => c.type === 'folder' && c.name === seg);
      if (!child) {
        child = { type: 'folder', name: seg, children: [] };
        cur.children.push(child);
      }
      cur = child;
    });
    cur.children.push({ type: 'file', name: file.name, id });
  });

  return root;
}

    } else {

// ─────────────────────────────────────────
// URL PREVIEW LOADER
// ─────────────────────────────────────────
async function loadUrlPreviews(id, container) {
  const entry = fileMap.get(id);
  if (!entry) return;
  let json;
  try {
    const text = await entry.file.text();
    json = JSON.parse(text);
  } catch(e) {
    const err = document.createElement('div');
    err.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size: 0.875rem;color:var(--error);padding:4px 8px';
    err.textContent = 'JSON parse error';
    container.appendChild(err);
    return;
  }

  const urls = extractUrls(json);
  if (!urls.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size: 0.875rem;color:var(--text3);padding:4px 8px';
    empty.textContent = 'No image URLs found';
    container.appendChild(empty);
    return;
  }

  urls.forEach(({ key, url }) => {
    const itemWrap = document.createElement('div');
    itemWrap.className = 'url-item';

    // Top row: thumb + key + url text
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%';

    const thumb = document.createElement('img');
    thumb.className = 'url-thumb';
    thumb.src = url;
    thumb.onerror = () => { thumb.style.display='none'; };

    const keyTag = document.createElement('div');
    keyTag.className = 'url-key';
    keyTag.textContent = key;

    const urlText = document.createElement('div');
    urlText.className = 'url-text';
    urlText.textContent = url;
    urlText.title = url;

    topRow.appendChild(thumb);
    topRow.appendChild(keyTag);
    topRow.appendChild(urlText);
    itemWrap.appendChild(topRow);

    // Full preview always visible below
    const previewImg = document.createElement('img');
    previewImg.className = 'url-preview-img';
    previewImg.src = url;
    previewImg.onerror = () => { previewImg.style.display='none'; };
    itemWrap.appendChild(previewImg);

    container.appendChild(itemWrap);
  });
}

function extractUrls(obj, prefix, result) {
  if (!result) result = [];
  if (!prefix) prefix = '';
  if (typeof obj === 'string') {
    if (/^https?:\/\/.+\.(png|jpe?g|gif|webp|svg|bmp|tiff?)(\?.*)?$/i.test(obj) ||
        /^https?:\/\/.+(image|img|photo|thumb|banner|icon)/i.test(obj)) {
      result.push({ key: prefix || 'url', url: obj });
    }
    return result;
  }
  if (Array.isArray(obj)) {
    obj.forEach((v, i) => extractUrls(v, `${prefix}[${i}]`, result));
    return result;
  }
  if (obj && typeof obj === 'object') {
    Object.entries(obj).forEach(([k, v]) => extractUrls(v, prefix ? `${prefix}.${k}` : k, result));
  }
  return result;
}

// ─────────────────────────────────────────
// RENDER RIGHT TREE
// ─────────────────────────────────────────
function renderRightTree() {
  rightTree.innerHTML = '';
  if (!results.size) {
    rightOverlay.classList.remove('hidden');
    return;
  }
  rightOverlay.classList.add('hidden');

  // Build same tree structure but only show converted files
  const root = buildTreeData(fileMap);

  function renderNode(node, depth, container) {
    if (node.type === 'folder' && node.name === '__root__') {
      node.children.forEach(c => renderNode(c, depth, container));
      return;
    }

    const wrap = document.createElement('div');
    wrap.className = 'tree-node';

    const row = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (depth * 16 + 4) + 'px';

    if (node.type === 'folder') {
      const toggle = document.createElement('div');
      toggle.className = 'tree-toggle';
      toggle.textContent = '▶';
      toggle.style.transform = 'rotate(90deg)';

      const icon = document.createElement('div');
      icon.className = 'tree-icon';
      icon.textContent = '📂';

      const name = document.createElement('div');
      name.className = 'tree-name folder-name';
      name.textContent = node.name + '/';

      // Folder checkbox — selects all files under it
      const folderCheck = document.createElement('input');
      folderCheck.type = 'checkbox';
      folderCheck.className = 'tree-check';
      const folderIds = collectIdsFromNode(node);
      const allSel = folderIds.length > 0 && folderIds.every(id => selectedIds.has(id));
      const someSel = folderIds.some(id => selectedIds.has(id));
      folderCheck.checked = allSel;
      folderCheck.indeterminate = !allSel && someSel;
      folderCheck.addEventListener('change', e => {
        e.stopPropagation();
        if (folderCheck.checked) folderIds.forEach(id => selectedIds.add(id));
        else folderIds.forEach(id => selectedIds.delete(id));
        renderRightTree();
        updateSelectionUI();
      });

      row.appendChild(folderCheck);
      row.appendChild(toggle);
      row.appendChild(icon);
      row.appendChild(name);

      const children = document.createElement('div');
      children.className = 'tree-children open';

      row.addEventListener('click', e => {
        if (e.target === folderCheck) return;
        e.stopPropagation();
        const open = children.classList.toggle('open');
        toggle.style.transform = open ? 'rotate(90deg)' : '';
        icon.textContent = open ? '📂' : '📁';
      });

      wrap.appendChild(row);
      wrap.appendChild(children);
      node.children.forEach(c => renderNode(c, depth + 1, children));

    } else {
      const r = results.get(node.id);
      if (!r) {
        // Not yet converted
        const toggle = document.createElement('div');
        toggle.className = 'tree-toggle';
        toggle.textContent = ' ';
        const icon = document.createElement('div');
        icon.className = 'tree-icon';
        icon.textContent = '⋯';
        const name = document.createElement('div');
        name.className = 'tree-name';
        name.style.color = 'var(--text3)';
        name.textContent = node.name.replace(/\.json$/, '.arl');
        row.appendChild(toggle);
        row.appendChild(icon);
        row.appendChild(name);
      } else if (r.error) {
        const toggle = document.createElement('div');
        toggle.className = 'tree-toggle';
        toggle.textContent = ' ';
        const icon = document.createElement('div');
        icon.className = 'tree-icon';
        icon.textContent = '❌';
        const name = document.createElement('div');
        name.className = 'tree-name';
        name.style.color = 'var(--error)';
        name.textContent = node.name.replace(/\.json$/, '.arl');
        const errMsg = document.createElement('div');
        errMsg.className = 'tree-status status-error';
        errMsg.textContent = r.error;
        row.appendChild(toggle);
        row.appendChild(icon);
        row.appendChild(name);
        row.appendChild(errMsg);
      } else {
        const toggle = document.createElement('div');
        toggle.className = 'tree-toggle';
        toggle.textContent = '▶';

        const icon = document.createElement('div');
        icon.className = 'tree-icon';
        icon.textContent = '✅';

        const name = document.createElement('div');
        name.className = 'tree-name converted-file-name';
        name.textContent = node.name.replace(/\.json$/, '.arl');

        const sizeEl = document.createElement('div');
        sizeEl.className = 'tree-status status-done';
        const bytes = JSON.stringify(r.data).length;
        sizeEl.textContent = bytes > 1024 ? (bytes/1024).toFixed(1)+'KB' : bytes+'B';

        // File checkbox
        const fileCheck = document.createElement('input');
        fileCheck.type = 'checkbox';
        fileCheck.className = 'tree-check';
        fileCheck.checked = selectedIds.has(node.id);
        fileCheck.addEventListener('change', e => {
          e.stopPropagation();
          if (fileCheck.checked) selectedIds.add(node.id);
          else selectedIds.delete(node.id);
          updateSelectionUI();
          // Update parent folder checkbox states without full re-render
          renderRightTree();
        });

        row.appendChild(fileCheck);
        row.appendChild(toggle);
        row.appendChild(icon);
        row.appendChild(name);
        row.appendChild(sizeEl);
        if (selectedIds.has(node.id)) row.classList.add('selected');

        // JSON preview of converted
        const preview = document.createElement('div');
        preview.className = 'url-list';
        const pre = document.createElement('pre');
        pre.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size: 0.875rem;color:var(--text2);padding:8px 12px;overflow:auto;max-height:200px;background:var(--surface2);border-radius:4px;border:1px solid var(--border);white-space:pre-wrap;word-break:break-all';
        pre.textContent = JSON.stringify(r.data, null, 2).slice(0, 2000) + (JSON.stringify(r.data).length > 2000 ? '\n...' : '');

        const dlItem = document.createElement('div');
        dlItem.style.cssText = 'display:flex;gap:8px;padding:4px 0 2px 0';

        const dlSingle = document.createElement('button');
        dlSingle.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size: 0.875rem;background:transparent;color:var(--accent2);border:1px solid var(--accent2);border-radius:4px;padding:3px 10px;cursor:pointer';
        dlSingle.textContent = '⬇ Download this file';
        dlSingle.addEventListener('click', e => {
          e.stopPropagation();
          downloadSingle(node.id);
        });
        dlItem.appendChild(dlSingle);
        preview.appendChild(dlItem);
        preview.appendChild(pre);

        let open = false;
        row.addEventListener('click', e => {
          e.stopPropagation();
          open = !open;
          preview.classList.toggle('open', open);
          toggle.style.transform = open ? 'rotate(90deg)' : '';
        });

        wrap.appendChild(row);
        wrap.appendChild(preview);
        container.appendChild(wrap);
        return;
      }

      wrap.appendChild(row);
    }

    container.appendChild(wrap);
  }

  renderNode(root, 0, rightTree);
}

// ─────────────────────────────────────────
// CONVERT
// ─────────────────────────────────────────
convertBtn.addEventListener('click', async () => {
  convertBtn.disabled = true;
  convertBtn.textContent = '⏳ Converting...';
  results.clear();

  progressWrap.classList.add('visible');
  const total = fileMap.size;
  let done = 0;

  const ids = [...fileMap.keys()];
  for (const id of ids) {
    const statusEl = document.getElementById(`status-left-${id}`);
    if (statusEl) { statusEl.className = 'tree-status status-processing'; statusEl.textContent = 'Processing...'; }

    try {
      const entry = fileMap.get(id);
      const text = await entry.file.text();
      const json = JSON.parse(text);
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(json),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const converted = await res.json();
      results.set(id, { data: converted });
      if (statusEl) { statusEl.className = 'tree-status status-done'; statusEl.textContent = '✅ Done'; }
    } catch(e) {
      results.set(id, { error: e.message });
      if (statusEl) { statusEl.className = 'tree-status status-error'; statusEl.textContent = '❌ Error'; }
    }

    done++;
    progressBar.style.width = (done / total * 100) + '%';
  }

  setTimeout(() => progressWrap.classList.remove('visible'), 800);

  convertBtn.disabled = false;
  convertBtn.textContent = '⚡ Convert';

  const hasSuccess = [...results.values()].some(r => !r.error);
  dlZipBtn.style.display = hasSuccess ? 'inline-flex' : 'none';
  dlFolderBtn.style.display = (hasSuccess && 'showDirectoryPicker' in window) ? 'inline-flex' : 'none';

  renderRightTree();
});

// ─────────────────────────────────────────
// DOWNLOAD SINGLE
// ─────────────────────────────────────────
function downloadSingle(id) {
  const r = results.get(id);
  if (!r || r.error) return;
  const entry = fileMap.get(id);
  const arlName = entry.file.name.replace(/\.json$/, '.arl');
  const blob = new Blob([JSON.stringify(r.data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = arlName;
  a.click();
}

// ─────────────────────────────────────────
// DOWNLOAD ZIP
// ─────────────────────────────────────────
dlZipBtn.addEventListener('click', async () => {
  const zip = new JSZip();
  fileMap.forEach((entry, id) => {
    const r = results.get(id);
    if (!r || r.error) return;
    const parts = [...entry.path, entry.file.name.replace(/\.json$/, '.arl')];
    const zipPath = parts.join('/');
    zip.file(zipPath, JSON.stringify(r.data, null, 2));
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.zip';
  a.click();
});

// ─────────────────────────────────────────
// DOWNLOAD AS FOLDER (File System Access API)
// ─────────────────────────────────────────
dlFolderBtn.addEventListener('click', async () => {
  if (!('showDirectoryPicker' in window)) {
    alert('Folder saving is not supported in this browser. Please use ZIP download.');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });

    for (const [id, entry] of fileMap) {
      const r = results.get(id);
      if (!r || r.error) continue;

      let curDir = dirHandle;
      for (const seg of entry.path) {
        curDir = await curDir.getDirectoryHandle(seg, { create: true });
      }
      const arlName = entry.file.name.replace(/\.json$/, '.arl');
      const fileHandle = await curDir.getFileHandle(arlName, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(r.data, null, 2));
      await writable.close();
    }

    alert('✅ Saved to folder successfully!');
  } catch (e) {
    if (e.name !== 'AbortError') alert('Save error: ' + e.message);
  }
});

// ─────────────────────────────────────────

// ─────────────────────────────────────────
let allExpanded = true;
let autoExpand = true; // auto-expand on file load

function toggleAutoExpand() {
  autoExpand = !autoExpand;
  const sw = document.getElementById('autoExpandToggle');
  sw.classList.toggle('on', autoExpand);
  // Re-render tree with new setting
  renderLeftTree();
  if (autoExpand) {
    allExpanded = true;
    const btn = document.getElementById('expandAllBtn');
    if (btn) btn.textContent = '⊟ Collapse All';
  }
}
function expandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  if (allExpanded) {
    // Open all folders
    leftTree.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
    leftTree.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = 'rotate(90deg)');
    leftTree.querySelectorAll('.tree-icon').forEach(el => { if(el.textContent==='📁') el.textContent='📂'; });
    // Open all url lists
    leftTree.querySelectorAll('.url-list').forEach(el => el.classList.add('open'));
    btn.textContent = '⊟ Collapse All';
  } else {
    // Close all folders
    leftTree.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
    leftTree.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = '');
    leftTree.querySelectorAll('.tree-icon').forEach(el => { if(el.textContent==='📂') el.textContent='📁'; });
    // Close all url lists
    leftTree.querySelectorAll('.url-list').forEach(el => el.classList.remove('open'));
    btn.textContent = '⊞ Expand All';
  }
}

// ─────────────────────────────────────────
// UPDATE UI
// ─────────────────────────────────────────
function updateUI() {
  const count = fileMap.size;
  fileCountEl.textContent = count ? `${count} file(s)` : 'No files';
  convertBtn.style.display = count ? 'inline-flex' : 'none';
  clearBtnEl.style.display = count ? 'inline-flex' : 'none';
  const expandBtn = document.getElementById('expandAllBtn');
  const autoLabel = document.getElementById('autoExpandLabel');
  const autoSw = document.getElementById('autoExpandToggle');
  if (expandBtn) expandBtn.style.display = count ? 'inline-flex' : 'none';
  if (autoLabel) autoLabel.style.display = count ? 'flex' : 'none';
  if (autoSw) autoSw.classList.toggle('on', autoExpand);
  if (autoExpand) {
    allExpanded = true;
    if (expandBtn) expandBtn.textContent = '⊟ Collapse All';
  }
  dropOverlay.classList.toggle('hidden', count > 0);
  renderLeftTree();
  renderRightTree();
}

// ─────────────────────────────────────────
// PASTE PANEL
// ─────────────────────────────────────────
let pasteCounter = 0; // tracks sample_N numbering across sessions

const pasteToggle   = document.getElementById('pasteToggle');
const pasteChevron  = document.getElementById('pasteChevron');
const pasteBody     = document.getElementById('pasteBody');
const pasteTextarea = document.getElementById('pasteTextarea');
const btnPasteAdd   = document.getElementById('btnPasteAdd');
const btnPasteClear = document.getElementById('btnPasteClear');
const pasteStatus   = document.getElementById('pasteStatus');

// Toggle open/close
pasteToggle.addEventListener('click', () => {
  const isOpen = pasteBody.classList.toggle('open');
  pasteChevron.classList.toggle('open', isOpen);
});

// Validate JSON as user types / pastes
pasteTextarea.addEventListener('input', validatePaste);
pasteTextarea.addEventListener('paste', () => setTimeout(validatePaste, 0));

function validatePaste() {
  const val = pasteTextarea.value.trim();
  if (!val) {
    pasteTextarea.className = 'paste-textarea';
    pasteStatus.textContent = '';
    pasteStatus.className = 'paste-status';
    btnPasteAdd.disabled = true;
    return;
  }
  try {
    JSON.parse(val);
    pasteTextarea.className = 'paste-textarea valid';
    pasteStatus.textContent = '✔ Valid JSON';
    pasteStatus.className = 'paste-status ok';
    btnPasteAdd.disabled = false;
  } catch (e) {
    pasteTextarea.className = 'paste-textarea invalid';
    pasteStatus.textContent = '✘ JSON error: ' + e.message.split('\n')[0];
    pasteStatus.className = 'paste-status err';
    btnPasteAdd.disabled = true;
  }
}

// Auto-detect paste anywhere in the left panel and open the panel
document.getElementById('panelLeft').addEventListener('paste', e => {
  const text = e.clipboardData?.getData('text');
  if (!text) return;
  // Only intercept if not already focused on the textarea
  if (document.activeElement === pasteTextarea) return;
  // Open the paste panel
  pasteBody.classList.add('open');
  pasteChevron.classList.add('open');
  pasteTextarea.value = text;
  validatePaste();
  pasteTextarea.focus();
  e.preventDefault();
});

// Add button — create a synthetic File and register it
btnPasteAdd.addEventListener('click', addPastedJSON);
pasteTextarea.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addPastedJSON();
});

function addPastedJSON() {
  const val = pasteTextarea.value.trim();
  if (!val) return;
  let parsed;
  try { parsed = JSON.parse(val); } catch { return; }

  pasteCounter++;
  const fileName = `sample_${pasteCounter}.json`;
  const blob = new Blob([JSON.stringify(parsed, null, 2)], { type: 'application/json' });
  const file = new File([blob], fileName, { type: 'application/json' });

  addFilesRaw([{ file, path: [] }]);

  // Reset textarea
  pasteTextarea.value = '';
  pasteTextarea.className = 'paste-textarea';
  pasteStatus.textContent = `✔ ${fileName} added`;
  pasteStatus.className = 'paste-status ok';
  btnPasteAdd.disabled = true;
  setTimeout(() => {
    if (pasteStatus.textContent.includes('added')) {
      pasteStatus.textContent = '';
      pasteStatus.className = 'paste-status';
    }
  }, 2500);
}

// Clear button
btnPasteClear.addEventListener('click', () => {
  pasteTextarea.value = '';
  pasteTextarea.className = 'paste-textarea';
  pasteStatus.textContent = '';
  pasteStatus.className = 'paste-status';
  btnPasteAdd.disabled = true;
});

// ─────────────────────────────────────────
// RESIZER
// ─────────────────────────────────────────
const resizer = document.getElementById('resizer');
const panelLeft = document.getElementById('panelLeft');
const panelRight = document.getElementById('panelRight');

let isResizing = false;
let startX, startLeftW;

resizer.addEventListener('mousedown', e => {
  isResizing = true;
  startX = e.clientX;
  startLeftW = panelLeft.getBoundingClientRect().width;
  resizer.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const dx = e.clientX - startX;
  const totalW = workspace.getBoundingClientRect().width - 4;
  let newLeft = startLeftW + dx;
  newLeft = Math.max(200, Math.min(totalW - 200, newLeft));
  panelLeft.style.flex = 'none';
  panelLeft.style.width = newLeft + 'px';
  panelRight.style.flex = '1';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizer.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
