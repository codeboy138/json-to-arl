<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON → ARL Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent2: #47ffce;
    --text: #f0f0f0;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 40px;
    font-family: 'Space Mono', monospace;
  }

  #dropzone {
    width: 100%;
    max-width: 560px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  #dropzone.drag { border-color: var(--accent); background: #111f00; }
  #dropzone.drag .drop-icon { transform: scale(1.15); }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
    transition: transform 0.2s;
  }

  .drop-text {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-text strong { color: var(--accent); }

  #fileInput { display: none; }

  #fileList {
    width: 100%;
    max-width: 560px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
  }

  .file-item .name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .status { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .file-item.done .status { color: var(--accent2); }
  .file-item.error .status { color: #ff6b6b; }
  .file-item.processing .status { color: var(--accent); }

  #convertBtn {
    margin-top: 24px;
    width: 100%;
    max-width: 560px;
    padding: 16px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  #convertBtn:hover { background: #fff; transform: translateY(-1px); }
  #convertBtn:active { transform: translateY(0); }
  #convertBtn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  #downloadBtn {
    margin-top: 12px;
    width: 100%;
    max-width: 560px;
    padding: 16px;
    background: transparent;
    color: var(--accent2);
    border: 2px solid var(--accent2);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  #downloadBtn:hover { background: var(--accent2); color: #0a0a0a; }

  .worker-url-wrap {
    width: 100%;
    max-width: 560px;
    margin-bottom: 32px;
  }

  .worker-url-wrap label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .worker-url-wrap input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .worker-url-wrap input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<h1>JSON <span>→</span> ARL</h1>
<p class="sub">design2d converter // image url → base64</p>

<div class="worker-url-wrap">
  <label>WORKER URL</label>
  <input type="text" id="workerUrl" placeholder="https://json-to-arl.cwicwi2016.workers.dev/convert" />
</div>

<div id="dropzone">
  <input type="file" id="fileInput" accept=".json" multiple>
  <div class="drop-icon">📂</div>
  <div class="drop-text">
    <strong>클릭하거나 파일을 드래그</strong>하세요<br>
    .json 파일 복수 선택 가능
  </div>
</div>

<div id="fileList"></div>
<button id="convertBtn">변환 시작</button>
<button id="downloadBtn">📦 ZIP 다운로드</button>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const workerUrlInput = document.getElementById('workerUrl');

  let files = [];
  let results = {};

  // 저장된 worker URL 불러오기
  workerUrlInput.value = localStorage.getItem('workerUrl') || '';
  workerUrlInput.dispatchEvent(new Event('change'));
  workerUrlInput.addEventListener('change', () => {
    localStorage.setItem('workerUrl', workerUrlInput.value.trim());
  });

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', e => addFiles([...e.target.files]));

  function addFiles(newFiles) {
    newFiles = newFiles.filter(f => f.name.endsWith('.json'));
    files = [...files, ...newFiles];
    renderList();
    convertBtn.style.display = files.length ? 'block' : 'none';
    downloadBtn.style.display = 'none';
  }

  function renderList() {
    fileList.innerHTML = '';
    files.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'file-item' + (results[i] ? (results[i].error ? ' error' : ' done') : '');
      div.id = `file-${i}`;
      div.innerHTML = `
        <span class="name">${f.name}</span>
        <span class="status">${results[i] ? (results[i].error ? '❌ 오류' : '✅ 완료') : '대기중'}</span>
      `;
      fileList.appendChild(div);
    });
  }

  function setStatus(i, status, cls) {
    const item = document.getElementById(`file-${i}`);
    if (!item) return;
    item.className = `file-item ${cls}`;
    item.querySelector('.status').textContent = status;
  }

  convertBtn.addEventListener('click', async () => {
    const workerUrl = document.getElementById('workerUrl').value.trim();
    if (!workerUrl) { alert('Worker URL을 입력하세요'); return; }

    convertBtn.disabled = true;
    convertBtn.textContent = '변환 중...';
    results = {};

    for (let i = 0; i < files.length; i++) {
      setStatus(i, '⏳ 처리중', 'processing');
      try {
        const text = await files[i].text();
        const json = JSON.parse(text);
        const res = await fetch(workerUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(json),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const converted = await res.json();
        results[i] = { data: converted };
        setStatus(i, '✅ 완료', 'done');
      } catch (e) {
        results[i] = { error: e.message };
        setStatus(i, `❌ ${e.message}`, 'error');
      }
    }

    convertBtn.disabled = false;
    convertBtn.textContent = '변환 시작';

    const hasSuccess = Object.values(results).some(r => !r.error);
    if (hasSuccess) downloadBtn.style.display = 'block';
  });

  downloadBtn.addEventListener('click', async () => {
    const zip = new JSZip();
    files.forEach((f, i) => {
      if (results[i] && !results[i].error) {
        const arlName = f.name.replace(/\.json$/, '.arl');
        zip.file(arlName, JSON.stringify(results[i].data, null, 2));
      }
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'converted.zip';
    a.click();
  });
</script>
</body>
</html>
